<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Login API</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            margin-top: 50px; 
            background-color: #f4f7f6;
        }
        .container { 
            background: white; 
            border: 1px solid #ddd; 
            padding: 30px; 
            border-radius: 8px; 
            width: 350px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { margin-top: 0; text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 14px; color: #555;}
        input { 
            width: 100%; 
            padding: 10px; 
            box-sizing: border-box; 
            border: 1px solid #ccc; 
            border-radius: 4px;
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            font-size: 16px;
            cursor: pointer; 
            transition: background 0.3s;
        }
        button:hover { background-color: #0056b3; }
        #result { 
            margin-top: 20px; 
            padding: 15px; 
            border-radius: 4px; 
            word-break: break-all; 
            font-size: 13px;
            white-space: pre-wrap;
        }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb;}
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;}
    </style>
</head>
<body>
    <div class="container">
        <h2>API Login Test</h2>
        <div class="form-group">
            <label>API Base URL</label>
            <input type="text" id="baseUrl" value="http://localhost:3000" />
            <small style="color: gray; font-size: 12px;">Change this to your Hostinger URL later!</small>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="test@gmail.com" />
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="password123" />
        </div>
        <button onclick="login()">Test Login</button>
        <div id="result" style="display: none;"></div>
    </div>

    <script>
        async function login() {
            // Get values
            let baseUrl = document.getElementById('baseUrl').value.trim();
            // Remove trailing slash if user accidentally adds one
            baseUrl = baseUrl.replace(/\/$/, "");
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            
            // Reset result UI
            resultDiv.style.display = 'block';
            resultDiv.className = '';
            resultDiv.innerText = 'Sending request...';

            try {
                // Your login route requires JSON
                const response = await fetch(`${baseUrl}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.className = 'success';
                    resultDiv.innerText = `✅ Success!\n\nToken:\n${data.token}\n\nUser Data:\n${JSON.stringify(data.user, null, 2)}`;
                } else {
                    resultDiv.className = 'error';
                    resultDiv.innerText = `❌ Error ${response.status}: ${data.message || 'Unknown error'}`;
                }
            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.innerText = `❌ Network/Fetch Error: ${error.message}\n\n(Make sure the server is running and CORS is enabled if testing locally!)`;
            }
        }
    </script>
</body>
</html>
